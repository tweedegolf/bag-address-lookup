name: Monthly release

on:
  schedule:
    - cron: "0 3 1 * *"
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  bump-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: true

      - name: Setup Rust
        shell: bash
        run: rustup update stable && rustup default stable

      - name: Cache cargo
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Set git identity
        run: |
          git config --global user.name "${GITHUB_ACTOR}"
          git config --global user.email "${GITHUB_ACTOR}@users.noreply.github.com"

      - name: Bump patch version
        id: bump
        run: |
          current_version=$(awk -F' *= *' '$1 == "version" { gsub(/"/, "", $2); print $2; exit }' Cargo.toml)
          if [ -z "$current_version" ]; then
            echo "version not found in Cargo.toml"
            exit 1
          fi

          new_version=$(echo "$current_version" | awk -F. '{ printf "%d.%d.%d\n", $1, $2, $3 + 1 }')
          if [ -z "$new_version" ]; then
            echo "failed to compute new version"
            exit 1
          fi

          sed -i "s/^version = \\\"[0-9]\\+\\.[0-9]\\+\\.[0-9]\\+\\\"/version = \\\"${new_version}\\\"/" Cargo.toml

          echo "version=${new_version}" >> "$GITHUB_OUTPUT"

      - name: Update Cargo.lock
        run: cargo update

      - name: Test
        run: cargo test --all-features

      - name: Commit version bump
        env:
          VERSION: ${{ steps.bump.outputs.version }}
        run: |
          git add Cargo.toml Cargo.lock
          git commit -m "chore: monthly release v${VERSION}"

      - name: Push
        run: git push origin HEAD:main

      - name: Trigger build workflow
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: "build.yml",
              ref: "main",
            });
