name: Monthly release

on:
  schedule:
    - cron: "0 3 1 * *"
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  bump-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Set git identity
        run: |
          git config --global user.name "${GITHUB_ACTOR}"
          git config --global user.email "${GITHUB_ACTOR}@users.noreply.github.com"

      - name: Bump patch version
        id: bump
        run: |
          current_version=$(awk -F' *= *' '$1 == "version" { gsub(/"/, "", $2); print $2; exit }' Cargo.toml)
          if [ -z "$current_version" ]; then
            echo "version not found in Cargo.toml"
            exit 1
          fi

          new_version=$(echo "$current_version" | awk -F. '{ printf "%d.%d.%d\n", $1, $2, $3 + 1 }')
          if [ -z "$new_version" ]; then
            echo "failed to compute new version"
            exit 1
          fi

          sed -i "s/^version = \\\"[0-9]\\+\\.[0-9]\\+\\.[0-9]\\+\\\"/version = \\\"${new_version}\\\"/" Cargo.toml

          echo "version=${new_version}" >> "$GITHUB_OUTPUT"

      - name: Update Cargo.lock
        run: cargo update

      - name: Test
        run: cargo test --all-features

      - name: Commit version bump
        run: |
          git add Cargo.toml Cargo.lock
          git commit -m "chore: monthly release v${{ steps.bump.outputs.version }}"

      - name: Push
        run: git push origin HEAD:main

      - name: Trigger build workflow
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: "build.yml",
              ref: "main",
            });
