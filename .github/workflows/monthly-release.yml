name: Monthly release

on:
  schedule:
    - cron: "0 3 1 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bump-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set git identity
        run: |
          git config --global user.name "${GITHUB_ACTOR}"
          git config --global user.email "${GITHUB_ACTOR}@users.noreply.github.com"

      - name: Bump minor version
        id: bump
        run: |
          current_version=$(awk -F' *= *' '$1 == "version" { gsub(/"/, "", $2); print $2; exit }' Cargo.toml)
          if [ -z "$current_version" ]; then
            echo "version not found in Cargo.toml"
            exit 1
          fi

          new_version=$(echo "$current_version" | awk -F. '{ printf "%d.%d.0\n", $1, $2 + 1 }')
          if [ -z "$new_version" ]; then
            echo "failed to compute new version"
            exit 1
          fi

          sed -i "s/^version = \\\"[0-9]\\+\\.[0-9]\\+\\.[0-9]\\+\\\"/version = \\\"${new_version}\\\"/" Cargo.toml

          echo "version=${new_version}" >> "$GITHUB_OUTPUT"

      - name: Update Cargo.lock
        run: cargo update -p bag_address_lookup

      - name: Test
        run: cargo test --all-features

      - name: Commit version bump
        run: |
          git add Cargo.toml Cargo.lock
          git commit -m "chore: monthly release v${{ steps.bump.outputs.version }}"

      - name: Push
        run: git push origin HEAD:main
