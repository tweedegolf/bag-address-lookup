name: Release binaries

on:
  workflow_run:
    workflows:
      - Checks
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

jobs:
  check-version:
    permissions:
      contents: read
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      release_exists: ${{ steps.release_check.outputs.release_exists }}
      should_run: ${{ steps.decide.outputs.should_run }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          persist-credentials: false

      - name: Read version
        id: version
        shell: bash
        run: |
          version=$(awk -F' *= *' '$1 == "version" { gsub(/"/, "", $2); print $2; exit }' Cargo.toml)
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Check release existence
        id: release_check
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          VERSION: ${{ steps.version.outputs.version }}
        with:
          script: |
            const tag = process.env.VERSION;
            try {
              await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag,
              });
              core.setOutput('release_exists', 'true');
            } catch (error) {
              if (error.status === 404) {
                core.setOutput('release_exists', 'false');
              } else {
                throw error;
              }
            }

      - name: Decide run
        id: decide
        shell: bash
        env:
          RELEASE_EXISTS: ${{ steps.release_check.outputs.release_exists }}
        run: |
          if [[ "$RELEASE_EXISTS" == "false" ]]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

  build-database:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    needs: check-version
    if: needs.check-version.outputs.should_run == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          persist-credentials: false

      - name: Setup Rust
        shell: bash
        run: rustup update stable && rustup default stable

      - name: Cache cargo
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Create data directory
        shell: bash
        run: mkdir -p data

      - name: Restore bag.bin cache
        id: bag_cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: data/bag.bin
          key: bag-bin-${{ needs.check-version.outputs.version }}

      - name: Create bag.bin
        if: steps.bag_cache.outputs.cache-hit != 'true'
        shell: bash
        run: cargo run --release --bin create-db --features "create"

      - name: Save bag.bin cache
        if: steps.bag_cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: data/bag.bin
          key: bag-bin-${{ needs.check-version.outputs.version }}

      - name: Upload bag.bin
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bag.bin
          path: data/bag.bin

  build:
    permissions:
      contents: read
    needs: [ check-version, build-database ]
    if: needs.check-version.outputs.should_run == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-musl
            artifact: bag-service-linux-x64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            artifact: bag-service-linux-arm64
          - os: macos-15-intel
            target: x86_64-apple-darwin
            artifact: bag-service-macos-x64
          - os: macos-15
            target: aarch64-apple-darwin
            artifact: bag-service-macos-arm64
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          persist-credentials: false

      - name: Download bag.bin
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: bag.bin
          path: data

      - name: Setup Rust
        shell: bash
        run: >
          rustup update stable &&
          rustup default stable &&
          rustup target add --toolchain stable ${{ matrix.target }}

      - name: Optionally install musl-tools
        if: matrix.target == 'x86_64-unknown-linux-musl' || matrix.target == 'arm64-unknown-linux-musl'
        shell: bash
        run: sudo apt-get install -y musl-tools

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Build
        shell: bash
        env:
          CC_aarch64_unknown_linux_musl: ${{ matrix.target == 'aarch64-unknown-linux-musl' && 'musl-gcc' || '' }}
        run: cargo build --release --bin bag-service --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/bag-service dist/${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  docker:
    permissions:
      contents: read
      packages: write
    needs:
      - check-version
      - build
    if: needs.check-version.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Download linux x64 artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: bag-service-linux-x64
          path: dist

      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push docker image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          file: Dockerfile
          push: true
          build-args: "version=${{ needs.check-version.outputs.version }}"
          context: dist
          tags: "ghcr.io/tweedegolf/bag-address-lookup:${{ needs.check-version.outputs.version }},ghcr.io/tweedegolf/bag-address-lookup:latest"

  release:
    permissions:
      contents: write
    needs:
      - check-version
      - build
    if: needs.check-version.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download linux x64 artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: bag-service-linux-x64
          path: dist

      - name: Download linux arm64 artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: bag-service-linux-arm64
          path: dist

      - name: Download macos x64 artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: bag-service-macos-x64
          path: dist

      - name: Download macos arm64 artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: bag-service-macos-arm64
          path: dist

      - name: Create release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.check-version.outputs.version }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release create "$VERSION" \
            --title "Version $VERSION" \
            --generate-notes \
            dist/bag-service-linux-x64 \
            dist/bag-service-linux-arm64 \
            dist/bag-service-macos-x64 \
            dist/bag-service-macos-arm64

  publish-library-branch:
    permissions:
      contents: write
    needs:
      - check-version
      - build-database
      - release
    if: needs.check-version.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          persist-credentials: true
          fetch-depth: 1

      - name: Download bag.bin
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: bag.bin
          path: data

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Publish release branch and library tag
        env:
          VERSION: ${{ needs.check-version.outputs.version }}
        run: |
          git checkout -B release
          git add -f data/bag.bin
          git commit -m "chore: publish v${VERSION} with bag.bin"
          git tag "lib-v${VERSION}"
          git push --force origin release
          git push origin "lib-v${VERSION}"
